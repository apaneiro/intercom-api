# =============================================================================
# GENERIC ESP32-S3 VA INTERCOM - Voice Assistant + Intercom
# =============================================================================
# Combines voice_assistant + micro_wake_word with intercom_api.
# Uses standard i2s_audio (separate I2S buses for mic + speaker).
# Mixer speaker shares hardware speaker between VA and Intercom.
#
# HARDWARE (example config, adapt GPIOs and settings to YOUR board):
#   - Board: Any ESP32-S3 with PSRAM
#   - Microphone: Any I2S MEMS (see MICROPHONE ALTERNATIVES below)
#   - Speaker: Any I2S amplifier (see SPEAKER ALTERNATIVES below)
#   - LED: WS2812/SK6812 RGB (optional, change pin to match your board)
#
# GPIO PINOUT (example, change to match your wiring):
#   Microphone I2S bus:  WS=GPIO37, SCK=GPIO36, SD=GPIO35
#   Speaker I2S bus:     LRC=GPIO6, BCLK=GPIO5, DIN=GPIO7
#   LED:                 DATA=GPIO38
#
# MAX98357A WIRING:
#   MAX98357A pin  ->  ESP32-S3 pin
#   ─────────────────────────────────
#   BCLK           ->  GPIO5
#   LRC            ->  GPIO6
#   DIN            ->  GPIO7
#   GND            ->  GND
#   VIN            ->  5V (or 3.3V, check your amp board)
#   SD (shutdown)  ->  leave unconnected or pull HIGH to enable
#
# MICROPHONE ALTERNATIVES:
#   If you're using a different I2S mic, change the microphone section below.
#   Adjust i2s_mic_bus GPIOs to match your wiring.
#
#   MSM261S4030H0R (default, this board):
#     bits_per_sample: 32bit
#     channel: left        (L/R pin tied to VCC, but convention is inverted)
#     dc_offset_removal: false (intercom_api)
#
#   INMP441:
#     bits_per_sample: 32bit
#     channel: left        (L/R to GND) or right (L/R to VCC)
#     dc_offset_removal: false (intercom_api)
#
#   SPH0645:
#     bits_per_sample: 32bit
#     channel: left
#     dc_offset_removal: true  (intercom_api, this mic has a large DC offset)
#
# SPEAKER ALTERNATIVES:
#   Adjust i2s_spk_bus GPIOs and hw_speaker settings to match your amp.
#
#   MAX98357A (default):
#     dac_type: external
#     bits_per_sample: 16bit
#     i2s_mode: primary
#
#   PCM5102A (HiFi DAC):
#     dac_type: external
#     bits_per_sample: 16bit
#     i2s_mode: primary
#     (wire SCK to GND, FMT to GND for I2S mode)
#
#   NS4168 (common on cheap boards):
#     dac_type: external
#     bits_per_sample: 16bit
#     i2s_mode: primary
#
# =============================================================================

substitutions:
  name: generic-esp32-s3
  friendly_name: Generic Esp32-s3

  # Wake word sensitivity (per-device tuning)
  wake_word_probability_cutoff: "0.60"
  wake_word_sliding_window_size: "6"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2025.5.0
  platformio_options:
    board_build.flash_mode: dio
  on_boot:
    priority: -100
    then:
      - delay: 1s
      - micro_wake_word.start:

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"

psram:
  mode: quad
  speed: 80MHz

preferences:
  flash_write_interval: 5min

# =============================================================================
# CONNECTIVITY
# =============================================================================
api:
  on_client_connected:
    - lambda: |-
        id(intercom).publish_entity_states();
        id(speaker_media_player).publish_state();
  on_client_disconnected:
    - voice_assistant.stop:

ota:
  - platform: esphome

logger:
  hardware_uart: USB_CDC
  level: INFO
  logs:
    intercom_api: INFO

network:
  enable_high_performance: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# =============================================================================
# EXTERNAL COMPONENTS
# =============================================================================
external_components:
  - source: github://n-IA-hane/intercom-api
    components: [intercom_api, esp_aec]

# =============================================================================
# I2S AUDIO BUSES
# =============================================================================
i2s_audio:
  - id: i2s_mic_bus
    i2s_lrclk_pin: GPIO37
    i2s_bclk_pin: GPIO36
  - id: i2s_spk_bus
    i2s_lrclk_pin: GPIO6
    i2s_bclk_pin: GPIO5

# =============================================================================
# MICROPHONE (MSM261S4030H0R) - shared by MWW, VA, and Intercom
# L/R pin tied to VCC, but works on left channel (inverted convention)
# =============================================================================
microphone:
  - platform: i2s_audio
    id: mic_component
    i2s_audio_id: i2s_mic_bus
    i2s_din_pin: GPIO35
    adc_type: external
    pdm: false
    bits_per_sample: 32bit
    sample_rate: 16000
    channel: left

# =============================================================================
# SPEAKERS (3-source mixer: media + TTS + intercom -> hw_speaker)
# =============================================================================
speaker:
  - platform: i2s_audio
    id: hw_speaker
    i2s_audio_id: i2s_spk_bus
    i2s_dout_pin: GPIO7
    dac_type: external
    i2s_mode: primary
    sample_rate: 16000
    bits_per_sample: 16bit
    timeout: never
    buffer_duration: 100ms

  # 3-source mixer: media (duckable) + TTS (never ducked) + intercom
  - platform: mixer
    id: audio_mixer
    output_speaker: hw_speaker
    num_channels: 1
    task_stack_in_psram: true
    source_speakers:
      - id: media_speaker_mix       # Music/radio streams (duckable)
        timeout: 10s
        buffer_duration: 100ms
      - id: tts_speaker_mix         # VA TTS announcements (never ducked)
        timeout: 10s
        buffer_duration: 100ms
      - id: intercom_speaker_mix    # Intercom audio
        timeout: 10s
        buffer_duration: 100ms

  # ResamplerSpeakers: convert any input rate to 16kHz before the mixer
  - platform: resampler
    id: media_speaker
    output_speaker: media_speaker_mix
    task_stack_in_psram: true

  - platform: resampler
    id: tts_speaker
    output_speaker: tts_speaker_mix
    task_stack_in_psram: true

  - platform: resampler
    id: intercom_speaker
    output_speaker: intercom_speaker_mix
    task_stack_in_psram: true

# =============================================================================
# MEDIA PLAYER (separate pipelines: media vs TTS announcement)
# =============================================================================
media_player:
  - platform: speaker
    id: speaker_media_player
    name: None
    internal: false
    media_pipeline:
      speaker: media_speaker
      sample_rate: 16000
      format: FLAC
    announcement_pipeline:
      speaker: tts_speaker
      sample_rate: 16000
      format: FLAC
    files:
      - id: timer_finished_sound
        file: sounds/timer_finished.flac
      - id: intercom_ringing_sound
        file: sounds/ringtone.flac
    on_announcement:
      - if:
          condition:
            intercom_api.is_idle: intercom
          then:
            - light.turn_on:
                id: status_led
                red: 30%
                green: 30%
                blue: 70%
                brightness: 60%
                effect: "Fast Pulse"
    on_play:
      - script.execute: restore_led
    on_pause:
      - media_player.stop:
    on_idle:
      - light.turn_off: status_led
      - delay: 300ms
      - script.execute: restore_led

# =============================================================================
# AEC (Acoustic Echo Cancellation)
# =============================================================================
esp_aec:
  id: aec_processor
  sample_rate: 16000
  filter_length: 4
  mode: sr_low_cost

# =============================================================================
# WAKE WORD + VOICE ASSISTANT
# =============================================================================
# MWW always-on (stop_after_detection: false). Callbacks only set LEDs.
# Ducking managed by on_wake_word_detected (acquire) and va_end_handler (release).
micro_wake_word:
  id: mww
  microphone: mic_component
  stop_after_detection: false
  on_wake_word_detected:
    # Acquire audio focus: duck media
    - mixer_speaker.apply_ducking:
        id: media_speaker_mix
        decibel_reduction: 20
        duration: 200ms
    # Barge-in: if VA/TTS active, stop and let va_end_handler restart VA
    - if:
        condition:
          or:
            - media_player.is_announcing:
            - voice_assistant.is_running:
        then:
          - globals.set:
              id: restart_intent
              value: "true"
          - voice_assistant.stop:
          - media_player.stop:
              announcement: true
        else:
          # Fresh start (no VA running)
          - voice_assistant.start:
              wake_word: !lambda return wake_word;
  models:
    - model: "wakewords/hey_trowyayoh.json"
      probability_cutoff: ${wake_word_probability_cutoff}
      sliding_window_size: ${wake_word_sliding_window_size}
    - model: alexa

voice_assistant:
  id: va
  microphone: mic_component
  media_player: speaker_media_player
  micro_wake_word: mww
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0

  on_listening:
    - light.turn_on:
        id: status_led
        red: 100%
        green: 0%
        blue: 0%
        brightness: 70%
        effect: "Slow Pulse"

  on_stt_vad_end:
    - light.turn_on:
        id: status_led
        red: 100%
        green: 55%
        blue: 0%
        brightness: 70%
        effect: "Fast Pulse"

  on_tts_start:
    - light.turn_on:
        id: status_led
        red: 30%
        green: 30%
        blue: 70%
        brightness: 60%
        effect: none

  on_end:
    - script.execute: va_end_handler

  on_error:
    # Always release audio focus on error
    - globals.set:
        id: restart_intent
        value: "false"
    - mixer_speaker.apply_ducking:
        id: media_speaker_mix
        decibel_reduction: 0
        duration: 300ms
    - if:
        condition:
          lambda: return !id(init_in_progress);
        then:
          - light.turn_on:
              id: status_led
              red: 100%
              green: 0%
              blue: 0%
              brightness: 70%
              effect: none
          - delay: 2s
          - script.execute: restore_led

  on_client_connected:
    - globals.set:
        id: init_in_progress
        value: 'false'
    - if:
        condition:
          and:
            - switch.is_off: mute
            - not:
                lambda: 'return id(mww).is_running();'
        then:
          - micro_wake_word.start:
    # Boost MWW task priority (default 3 → 8)
    - delay: 1s
    - lambda: |-
        TaskHandle_t mww_task = xTaskGetHandle("mww");
        if (mww_task) {
          vTaskPrioritySet(mww_task, 8);
        }

  on_client_disconnected:
    - micro_wake_word.stop:

# =============================================================================
# INTERCOM API (TCP-based, port 6054)
# =============================================================================
intercom_api:
  id: intercom
  mode: full
  microphone: mic_component
  speaker: intercom_speaker
  dc_offset_removal: true
  aec_id: aec_processor
  ringing_timeout: 30s

  on_outgoing_call:
    - mixer_speaker.apply_ducking:
        id: media_speaker_mix
        decibel_reduction: 20
        duration: 200ms
    - light.turn_on:
        id: status_led
        effect: "Calling"
    - if:
        condition:
          lambda: 'return id(intercom).get_current_destination() == "Home Assistant";'
        then:
          - homeassistant.event:
              event: esphome.intercom_call
              data:
                caller: !lambda 'return App.get_friendly_name();'
                destination: "Home Assistant"
                type: "doorbell"

  on_ringing:
    - mixer_speaker.apply_ducking:
        id: media_speaker_mix
        decibel_reduction: 20
        duration: 200ms
    - light.turn_on:
        id: status_led
        effect: "Ringing"
        red: 100%
        green: 0%
        blue: 0%
    - script.execute: intercom_ringing_loop

  on_answered:
    - logger.log: "Call answered"

  on_streaming:
    - script.stop: intercom_ringing_loop
    - mixer_speaker.apply_ducking:
        id: media_speaker_mix
        decibel_reduction: 20
        duration: 200ms
    - light.turn_on:
        id: status_led
        effect: none
        red: 30%
        green: 69%
        blue: 31%
        brightness: 100%

  on_idle:
    - script.stop: intercom_ringing_loop
    - if:
        condition:
          not:
            voice_assistant.is_running:
        then:
          - mixer_speaker.apply_ducking:
              id: media_speaker_mix
              decibel_reduction: 0
              duration: 500ms
    - script.execute: restore_led

  on_hangup:
    - script.stop: intercom_ringing_loop
    - if:
        condition:
          not:
            voice_assistant.is_running:
        then:
          - mixer_speaker.apply_ducking:
              id: media_speaker_mix
              decibel_reduction: 0
              duration: 500ms
    - script.execute: restore_led
    - logger.log:
        format: "Hangup: %s"
        args: ['reason.c_str()']

  on_call_failed:
    - script.stop: intercom_ringing_loop
    - if:
        condition:
          not:
            voice_assistant.is_running:
        then:
          - mixer_speaker.apply_ducking:
              id: media_speaker_mix
              decibel_reduction: 0
              duration: 500ms
    - light.turn_on:
        id: status_led
        red: 100%
        green: 0%
        blue: 0%
        brightness: 70%
        effect: none
    - delay: 2s
    - script.execute: restore_led
    - logger.log:
        format: "Call failed: %s"
        args: ['reason.c_str()']

# =============================================================================
# Globals
# =============================================================================
globals:
  - id: init_in_progress
    type: bool
    restore_value: false
    initial_value: "true"
  - id: restart_intent
    type: bool
    restore_value: false
    initial_value: "false"

# =============================================================================
# SCRIPTS
# =============================================================================
script:
  # VA end handler — mode: restart ensures barge-in cancels previous on_end
  - id: va_end_handler
    mode: restart
    then:
      # Wait for TTS to finish playing
      - wait_until:
          condition:
            - media_player.is_announcing:
          timeout: 0.5s
      - wait_until:
          condition:
            and:
              - not:
                  media_player.is_announcing:
              - not:
                  speaker.is_playing:
                      id: tts_speaker
          timeout: 30s
      - if:
          condition:
            or:
              - media_player.is_announcing:
              - speaker.is_playing:
                  id: tts_speaker
          then:
            - logger.log:
                level: WARN
                format: "VA: TTS drain timeout, forcing cleanup"
            - media_player.stop:
                announcement: true
      - delay: 100ms
      - voice_assistant.stop:
      # Barge-in: restart VA. Otherwise release audio focus.
      - if:
          condition:
            lambda: 'return id(restart_intent);'
          then:
            - globals.set:
                id: restart_intent
                value: "false"
            # Wait for VA to reach IDLE — start() is silently ignored if not IDLE
            - wait_until:
                condition:
                  not:
                    voice_assistant.is_running:
                timeout: 2s
            - voice_assistant.start:
          else:
            - mixer_speaker.apply_ducking:
                id: media_speaker_mix
                decibel_reduction: 0
                duration: 500ms
            - script.execute: restore_led

  - id: restore_led
    mode: restart
    then:
      - if:
          condition:
            and:
              - switch.is_on: mute
              - switch.is_on: speaker_mute
          then:
            # Both muted — red slow pulse
            - light.turn_on:
                id: status_led
                red: 100%
                green: 0%
                blue: 0%
                brightness: 40%
                effect: "Slow Pulse"
          else:
            - if:
                condition:
                  switch.is_on: mute
                then:
                  # Mic muted — red dim
                  - light.turn_on:
                      id: status_led
                      red: 100%
                      green: 0%
                      blue: 0%
                      brightness: 30%
                      effect: none
                else:
                  - if:
                      condition:
                        switch.is_on: speaker_mute
                      then:
                        # Speaker muted — orange dim
                        - light.turn_on:
                            id: status_led
                            red: 100%
                            green: 50%
                            blue: 0%
                            brightness: 30%
                            effect: none
                      else:
                        - if:
                            condition:
                              or:
                                - intercom_api.is_ringing: intercom
                                - intercom_api.is_incoming: intercom
                            then:
                              - logger.log: "restore_led: ringing, keeping strobe"
                            else:
                              - if:
                                  condition:
                                    intercom_api.is_in_call: intercom
                                  then:
                                    - light.turn_on:
                                        id: status_led
                                        red: 30%
                                        green: 69%
                                        blue: 31%
                                        brightness: 100%
                                        effect: none
                                  else:
                                    - if:
                                        condition:
                                          or:
                                            - media_player.is_announcing:
                                            - media_player.is_playing:
                                        then:
                                          - light.turn_on:
                                              id: status_led
                                              red: 0%
                                              green: 100%
                                              blue: 0%
                                              brightness: 100%
                                              effect: "Slow Pulse"
                                        else:
                                          - light.turn_off: status_led

  - id: intercom_ringing_loop
    mode: restart
    then:
      - while:
          condition:
            or:
              - intercom_api.is_ringing: intercom
              - intercom_api.is_incoming: intercom
          then:
            - media_player.speaker.play_on_device_media_file:
                media_file: intercom_ringing_sound
                announcement: true
            - delay: 3s

  # Wake word management (guarded)
  - id: start_wake_word
    then:
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - switch.is_off: mute
          then:
            - micro_wake_word.start:

# =============================================================================
# BUTTONS
# =============================================================================
button:
  - platform: template
    id: call_button
    name: "Call"
    icon: "mdi:phone"
    on_press:
      - intercom_api.call_toggle:
          id: intercom

  - platform: template
    id: next_contact_button
    name: "Next Contact"
    icon: "mdi:arrow-right"
    on_press:
      - intercom_api.next_contact:
          id: intercom

  - platform: template
    id: prev_contact_button
    name: "Previous Contact"
    icon: "mdi:arrow-left"
    on_press:
      - intercom_api.prev_contact:
          id: intercom

  - platform: template
    id: decline_button
    name: "Decline"
    icon: "mdi:phone-hangup"
    on_press:
      - intercom_api.decline_call:
          id: intercom

  - platform: restart
    name: "Restart"
    icon: "mdi:restart"

# =============================================================================
# SWITCHES
# =============================================================================
switch:
  - platform: intercom_api
    intercom_api_id: intercom
    auto_answer:
      id: auto_answer_switch
      name: "Auto Answer"
      restore_mode: RESTORE_DEFAULT_ON
    aec:
      id: aec_switch
      name: "Echo Cancellation"
      restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    id: mute
    name: Mic Mute
    icon: mdi:microphone-off
    optimistic: true
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - micro_wake_word.stop:
      - voice_assistant.stop:
      - microphone.mute:
          id: mic_component
      - light.turn_on:
          id: status_led
          red: 100%
          green: 0%
          blue: 0%
          brightness: 60%
          effect: "Fast Pulse"
      - delay: 2s
      - script.execute: restore_led
    on_turn_off:
      - microphone.unmute:
          id: mic_component
      - script.execute: start_wake_word
      - light.turn_on:
          id: status_led
          red: 0%
          green: 100%
          blue: 0%
          brightness: 60%
          effect: "Fast Pulse"
      - delay: 2s
      - script.execute: restore_led

  # Speaker Mute — software mute on hw_speaker
  - platform: template
    name: Speaker Mute
    id: speaker_mute
    icon: mdi:volume-off
    optimistic: true
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - speaker.mute_on: hw_speaker
      - light.turn_on:
          id: status_led
          red: 100%
          green: 50%
          blue: 0%
          brightness: 60%
          effect: "Fast Pulse"
      - delay: 2s
      - script.execute: restore_led
    on_turn_off:
      - speaker.mute_off: hw_speaker
      - light.turn_on:
          id: status_led
          red: 0%
          green: 100%
          blue: 0%
          brightness: 60%
          effect: "Fast Pulse"
      - delay: 2s
      - script.execute: restore_led

  # MWW active status + control
  - platform: template
    name: Wake Word
    id: wake_word_switch
    icon: mdi:account-voice
    restore_mode: DISABLED
    lambda: 'return id(mww).is_running();'
    turn_on_action:
      - if:
          condition:
            not:
              lambda: 'return id(mww).is_running();'
          then:
            - micro_wake_word.start:
    turn_off_action:
      - micro_wake_word.stop:

# =============================================================================
# NUMBERS
# =============================================================================
number:
  - platform: intercom_api
    intercom_api_id: intercom
    mic_gain:
      id: mic_gain
      name: "Mic Gain"

# =============================================================================
# STATUS LED (SK6812 RGB on GPIO33)
# =============================================================================
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "Status LED"
    icon: "mdi:led-on"
    pin: GPIO33
    chipset: SK6812
    num_leds: 1
    rgb_order: GRB
    effects:
      - pulse:
          name: "Slow Pulse"
          min_brightness: 20%
          max_brightness: 100%
          transition_length: 1s
          update_interval: 1s
      - pulse:
          name: "Fast Pulse"
          transition_length: 0.5s
          update_interval: 0.5s
          min_brightness: 0%
          max_brightness: 100%
      - strobe:
          name: "Ringing"
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 0%
              blue: 0%
              duration: 250ms
            - state: false
              duration: 250ms
      - strobe:
          name: "Calling"
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 50%
              blue: 0%
              duration: 500ms
            - state: false
              duration: 500ms

# =============================================================================
# TEXT SENSORS
# =============================================================================
text_sensor:
  - platform: homeassistant
    id: ha_active_devices
    entity_id: sensor.intercom_active_devices
    on_value:
      - intercom_api.set_contacts:
          id: intercom
          contacts_csv: !lambda 'return x;'

# =============================================================================
# DIAGNOSTICS
# =============================================================================
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    update_interval: 60s

  - platform: internal_temperature
    name: "CPU Temperature"
    update_interval: 60s
